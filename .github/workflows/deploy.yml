name: Deploy Backend to Hostinger VPS

on:
  push:
    branches: [ main ]

env:
  # This removes the warning and opts into the new Node 24 standard early
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # This is already the latest, Node 24 ready

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3 # Also Node 24 compatible
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/WritingCoachBackend || exit
            git pull origin main
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            echo "PORT=8080" >> .env
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart writingcoach