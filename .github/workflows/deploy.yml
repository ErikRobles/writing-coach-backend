name: Deploy Backend to Hostinger VPS

on:
  push:
    branches: [ main ]

env:
  # Opts into the new Node 24 standard early to remove warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to the project folder
            cd /var/www/WritingCoachBackend || exit
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Recreate the .env file with secrets from GitHub
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
            echo "PORT=8080" >> .env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
            echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
            echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
            echo "SMTP_FROM=${{ secrets.SMTP_FROM }}" >> .env
            
            # Ensure dependencies are up to date
            ./venv/bin/pip install -r requirements.txt
            
            # Restart the service to apply changes
            sudo systemctl restart writingcoach